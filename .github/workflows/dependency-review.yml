name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@bc41886e18ea39df68b1b1245f4184881938e050 # v4.5.0
        with:
          fail-on-severity: high
